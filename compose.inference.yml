# GPU inference services. Memory split: vLLM 75% / Ollama 25% of the inference pool.
# IMPORTANT bring-up order: vLLM first (it pre-allocates its slice), then Ollama.
networks:
  apex:
    name: apex

# Model data (re-downloadable) lives on the /data/models LV (1.8TB, XFS, not
# backed up) — bind-mounted, not in Docker named volumes. See STORAGE.md.

services:
  # ── vLLM — 75% of inference pool (~84GB via gpu-memory-utilization 0.65) ──
  vllm:
    image: nvcr.io/nvidia/vllm:25.11-py3      # NGC Spark-tuned, GB10/sm_121 ready
    # Shell form is used so we can conditionally append --reasoning-parser
    # only when VLLM_REASONING_PARSER is set. exec ensures vllm still
    # receives signals. When the parser is enabled, vLLM splits the model's
    # <think>...</think> tokens out of choices[].message.content into
    # choices[].message.reasoning_content, so OpenAI-compatible clients
    # (NORA, SIRA) see only the clean answer.
    # Note: vLLM 0.8+ (NGC 25.11+) removed the separate --enable-reasoning
    # flag — the presence of --reasoning-parser is enough.
    command:
      - sh
      - -c
      - >
        exec vllm serve "${VLLM_MODEL}"
        --gpu-memory-utilization "${VLLM_GPU_UTIL}"
        --max-model-len "${VLLM_MAX_LEN}"
        --host 0.0.0.0 --port 8000
        ${VLLM_REASONING_PARSER:+--reasoning-parser "${VLLM_REASONING_PARSER}"}
    environment:
      HF_TOKEN: ${HF_TOKEN}
      HF_HUB_ENABLE_HF_TRANSFER: "1"
      HF_HOME: /data/hf-cache       # points HF lib at the bind-mounted cache below
    volumes:
      # Mount the WHOLE /data/models tree so the container sees both:
      #   /data/hf-cache    (HF cache layout — for VLLM_MODEL=Qwen/Qwen3-32B-AWQ style)
      #   /data/local       (flat dirs from hf-curl-download.sh — for VLLM_MODEL=/data/local/<repo>)
      - /data/models:/data
    # NVIDIA NGC vLLM image REQUIRES these — default Docker SHM is 64MB which
    # is way too small for vLLM's multi-process IPC; engine cores fail to start.
    # Without these, you get: "Engine core initialization failed, Failed core proc(s): {}"
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    networks: [apex]
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 300s          # large models take minutes to load

  # ── Ollama — 25% of inference pool (~28GB; enforced by 1-model-at-a-time) ──
  ollama:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: "0.0.0.0"
      OLLAMA_MAX_LOADED_MODELS: "1"   # hard discipline so Ollama stays in its 28GB
      OLLAMA_NUM_PARALLEL: "2"
      OLLAMA_KEEP_ALIVE: "30m"
    volumes:
      - /data/models/ollama:/root/.ollama
    networks: [apex]
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── TEI — production embeddings for the RAG pipeline ──
  # NOTE: HuggingFace doesn't publish an arm64 prebuilt for TEI on any tag,
  # so this image must be BUILT FROM SOURCE on the spark — see SETUP.md B2-build.
  # Default below is the CPU/arm64 build (~50-150ms/embedding, no GPU mem cost,
  # ~15 min to build). To switch to the full GB10/sm_121 GPU build
  # (~5-15ms/embedding, ~4 GB GPU mem, ~30-60 min to build):
  #   1. set TEI_IMAGE=local/tei:gb10 in .env (or change `image:` below)
  #   2. add a `deploy.resources.reservations.devices` block (see vllm above)
  #   3. adjust VLLM_GPU_UTIL down ~0.03 to make room for TEI's ~4 GB
  tei:
    image: ${TEI_IMAGE:-local/tei:cpu-arm64}
    command: ["--model-id", "${TEI_MODEL}"]
    environment:
      HF_TOKEN: ${HF_TOKEN}
      HF_HOME: /data/hf-cache       # points HF lib at the bind-mounted cache below
    volumes:
      # Same as vllm — see explanation above. TEI_MODEL can be either:
      #   BAAI/bge-m3                   (HF cache layout under /data/hf-cache)
      #   /data/local/bge-m3            (flat dir from hf-curl-download.sh)
      - /data/models:/data
    networks: [apex]
    restart: unless-stopped
