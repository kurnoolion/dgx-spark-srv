# GPU inference services. Memory split: vLLM 75% / Ollama 25% of the inference pool.
# IMPORTANT bring-up order: vLLM first (it pre-allocates its slice), then Ollama.
networks:
  apex:
    name: apex

# Model data (re-downloadable) lives on the /data/models LV (1.8TB, XFS, not
# backed up) — bind-mounted, not in Docker named volumes. See STORAGE.md.

services:
  # ── vLLM — 75% of inference pool (~84GB via gpu-memory-utilization 0.65) ──
  vllm:
    image: nvcr.io/nvidia/vllm:25.11-py3      # NGC Spark-tuned, GB10/sm_121 ready
    # Shell form is used for two reasons:
    #   1. resolve VLLM_MODEL — supports three forms, see below.
    #   2. conditionally append --reasoning-parser only when set.
    # exec ensures vllm still receives signals (Ctrl-C, SIGTERM).
    #
    # VLLM_MODEL resolution rules:
    #   "Qwen3-32B-AWQ"               → loads /data/local/Qwen3-32B-AWQ
    #                                   (bare name shorthand — preferred)
    #   "/data/local/Qwen3-32B-AWQ"   → loads from that path (legacy form,
    #                                   still works)
    #   "Qwen/Qwen3-32B-AWQ"          → HF repo ID (looked up in HF cache
    #                                   under /data/hf-cache)
    #
    # --served-model-name is always set to a clean short name (basename for
    # paths, full ID for HF repos) so OpenAI-compatible clients can request
    # `"model": "Qwen3-32B-AWQ"` regardless of how vLLM was configured to
    # find the weights.
    #
    # When the reasoning parser is enabled, vLLM splits <think>...</think>
    # tokens out of message.content into message.reasoning_content.
    # vLLM 0.8+ (NGC 25.11+) dropped --enable-reasoning — passing
    # --reasoning-parser alone is sufficient.
    # NB: $$ escapes a literal $ past Compose's variable interpolation. Shell
    # variables we define here (M, LOAD, SERVED) must use $$ so Compose passes
    # them through unchanged; ${VLLM_*} should stay single-$ to be expanded by
    # Compose from .env at container-start time.
    command:
      - sh
      - -c
      - >
        M="${VLLM_MODEL}";
        case "$$M" in
          /*)   LOAD="$$M";             SERVED="$${M##*/}" ;;
          */*)  LOAD="$$M";             SERVED="$$M" ;;
          *)    LOAD="/data/local/$$M"; SERVED="$$M" ;;
        esac;
        echo "vLLM loading: $$LOAD   (API model name: $$SERVED)";
        exec vllm serve "$$LOAD"
        --served-model-name "$$SERVED"
        --gpu-memory-utilization "${VLLM_GPU_UTIL}"
        --max-model-len "${VLLM_MAX_LEN}"
        --host 0.0.0.0 --port 8000
        ${VLLM_REASONING_PARSER:+--reasoning-parser "${VLLM_REASONING_PARSER}"}
    environment:
      HF_TOKEN: ${HF_TOKEN}
      HF_HUB_ENABLE_HF_TRANSFER: "1"
      HF_HOME: /data/hf-cache       # points HF lib at the bind-mounted cache below
    volumes:
      # Mount the WHOLE /data/models tree so the container sees both:
      #   /data/hf-cache    (HF cache layout — for VLLM_MODEL=Qwen/Qwen3-32B-AWQ style)
      #   /data/local       (flat dirs from hf-curl-download.sh — for VLLM_MODEL=/data/local/<repo>)
      - /data/models:/data
    # NVIDIA NGC vLLM image REQUIRES these — default Docker SHM is 64MB which
    # is way too small for vLLM's multi-process IPC; engine cores fail to start.
    # Without these, you get: "Engine core initialization failed, Failed core proc(s): {}"
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    networks: [apex]
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 300s          # large models take minutes to load

  # ── Ollama — 25% of inference pool (~28GB; enforced by 1-model-at-a-time) ──
  ollama:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: "0.0.0.0"
      OLLAMA_MAX_LOADED_MODELS: "1"   # hard discipline so Ollama stays in its 28GB
      OLLAMA_NUM_PARALLEL: "2"
      OLLAMA_KEEP_ALIVE: "30m"
    volumes:
      - /data/models/ollama:/root/.ollama
    networks: [apex]
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── TEI — production embeddings for the RAG pipeline ──
  # NOTE: HuggingFace doesn't publish an arm64 prebuilt for TEI on any tag,
  # so this image must be BUILT FROM SOURCE on the spark — see SETUP.md B2-build.
  # Default below is the CPU/arm64 build (~50-150ms/embedding, no GPU mem cost,
  # ~15 min to build). To switch to the full GB10/sm_121 GPU build
  # (~5-15ms/embedding, ~4 GB GPU mem, ~30-60 min to build):
  #   1. set TEI_IMAGE=local/tei:gb10 in .env (or change `image:` below)
  #   2. add a `deploy.resources.reservations.devices` block (see vllm above)
  #   3. adjust VLLM_GPU_UTIL down ~0.03 to make room for TEI's ~4 GB
  tei:
    image: ${TEI_IMAGE:-local/tei:cpu-arm64}
    # The TEI image bakes in ENTRYPOINT ["text-embeddings-router"], which would
    # consume our `sh -c` as positional args. Clear the entrypoint so `command`
    # is the full command line, then exec back into the binary ourselves.
    entrypoint: []
    # Same VLLM_MODEL-style resolver as the vllm service: bare names expand to
    # /data/local/<name>, absolute paths and HF repo IDs pass through.
    command:
      - sh
      - -c
      - >
        M="${TEI_MODEL}";
        case "$$M" in
          /*)   LOAD="$$M" ;;
          */*)  LOAD="$$M" ;;
          *)    LOAD="/data/local/$$M" ;;
        esac;
        echo "TEI embedder loading: $$LOAD";
        exec text-embeddings-router --model-id "$$LOAD"
    environment:
      HF_TOKEN: ${HF_TOKEN}
      HF_HOME: /data/hf-cache       # points HF lib at the bind-mounted cache below
    volumes:
      # Same as vllm — see explanation above. TEI_MODEL accepts three forms:
      #   bge-m3                        (bare name — preferred; expands to /data/local/bge-m3)
      #   /data/local/bge-m3            (absolute path; legacy)
      #   BAAI/bge-m3                   (HF repo ID — HF cache layout under /data/hf-cache)
      - /data/models:/data
    networks: [apex]
    restart: unless-stopped

  # ── TEI reranker — second TEI instance for the RAG /rerank endpoint ──
  # Same image as the embedder above; TEI auto-detects cross-encoder models
  # from config.json and exposes /rerank (Cohere-compatible) instead of /embed.
  # CPU/arm64 is plenty for ~300-600M cross-encoder rerankers (~100-350ms to
  # rerank 25-50 candidates) — no GPU stake required, doesn't compete with vLLM.
  # If you need higher throughput later, swap TEI_IMAGE to a GPU build and
  # add a deploy.devices block like the vllm service has.
  # NB: TEI's ORT backend requires onnx/model.onnx in the model dir. Verify
  # any new reranker has it on HF before pointing TEI_RERANKER_MODEL at it.
  tei-reranker:
    image: ${TEI_IMAGE:-local/tei:cpu-arm64}
    entrypoint: []                              # see tei service comment above
    command:
      - sh
      - -c
      - >
        M="${TEI_RERANKER_MODEL}";
        case "$$M" in
          /*)   LOAD="$$M" ;;
          */*)  LOAD="$$M" ;;
          *)    LOAD="/data/local/$$M" ;;
        esac;
        echo "TEI reranker loading: $$LOAD";
        exec text-embeddings-router --model-id "$$LOAD"
    environment:
      HF_TOKEN: ${HF_TOKEN}
      HF_HOME: /data/hf-cache
    volumes:
      - /data/models:/data
    networks: [apex]
    restart: unless-stopped
