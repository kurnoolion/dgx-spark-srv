# GPU inference services. Memory split: vLLM 75% / Ollama 25% of the inference pool.
# IMPORTANT bring-up order: vLLM first (it pre-allocates its slice), then Ollama.
networks:
  apex:
    name: apex

# Model data (re-downloadable) lives on the /data/models LV (1.8TB, XFS, not
# backed up) — bind-mounted, not in Docker named volumes. See STORAGE.md.

services:
  # ── vLLM — 75% of inference pool (~84GB via gpu-memory-utilization 0.65) ──
  vllm:
    image: nvcr.io/nvidia/vllm:25.11-py3      # NGC Spark-tuned, GB10/sm_121 ready
    # Shell form is used for two reasons:
    #   1. resolve VLLM_MODEL — supports three forms, see below.
    #   2. conditionally append --reasoning-parser only when set.
    # exec ensures vllm still receives signals (Ctrl-C, SIGTERM).
    #
    # VLLM_MODEL resolution rules:
    #   "Qwen3-32B-AWQ"               → loads /data/local/Qwen3-32B-AWQ
    #                                   (bare name shorthand — preferred)
    #   "/data/local/Qwen3-32B-AWQ"   → loads from that path (legacy form,
    #                                   still works)
    #   "Qwen/Qwen3-32B-AWQ"          → HF repo ID (looked up in HF cache
    #                                   under /data/hf-cache)
    #
    # --served-model-name is always set to a clean short name (basename for
    # paths, full ID for HF repos) so OpenAI-compatible clients can request
    # `"model": "Qwen3-32B-AWQ"` regardless of how vLLM was configured to
    # find the weights.
    #
    # When the reasoning parser is enabled, vLLM splits <think>...</think>
    # tokens out of message.content into message.reasoning_content.
    # vLLM 0.8+ (NGC 25.11+) dropped --enable-reasoning — passing
    # --reasoning-parser alone is sufficient.
    #
    # VLLM_ROPE_SCALING is a JSON dict passed straight to vLLM's --rope-scaling
    # (Qwen3 long-context via YaRN, etc.). Leave BLANK for native context so
    # the flag is omitted entirely — YaRN degrades quality at short prompts
    # and there's no auto-engage in vLLM.
    #
    # NB: $$ escapes a literal $ past Compose's variable interpolation. Shell
    # variables we define here (M, LOAD, SERVED) must use $$ so Compose passes
    # them through unchanged; ${VLLM_*} should stay single-$ to be expanded by
    # Compose from .env at container-start time.
    command:
      - sh
      - -c
      - >
        M="${VLLM_MODEL}";
        case "$$M" in
          /*)   LOAD="$$M";             SERVED="$${M##*/}" ;;
          */*)  LOAD="$$M";             SERVED="$$M" ;;
          *)    LOAD="/data/local/$$M"; SERVED="$$M" ;;
        esac;
        echo "vLLM loading: $$LOAD   (API model name: $$SERVED)";
        exec vllm serve "$$LOAD"
        --served-model-name "$$SERVED"
        --gpu-memory-utilization "${VLLM_GPU_UTIL}"
        --max-model-len "${VLLM_MAX_LEN}"
        --host 0.0.0.0 --port 8000
        ${VLLM_REASONING_PARSER:+--reasoning-parser "${VLLM_REASONING_PARSER}"}
        ${VLLM_ROPE_SCALING:+--rope-scaling '${VLLM_ROPE_SCALING}'}
    environment:
      HF_TOKEN: ${HF_TOKEN}
      HF_HUB_ENABLE_HF_TRANSFER: "1"
      HF_HOME: /data/hf-cache       # points HF lib at the bind-mounted cache below
    volumes:
      # Mount the WHOLE /data/models tree so the container sees both:
      #   /data/hf-cache    (HF cache layout — for VLLM_MODEL=Qwen/Qwen3-32B-AWQ style)
      #   /data/local       (flat dirs from hf-curl-download.sh — for VLLM_MODEL=/data/local/<repo>)
      - /data/models:/data
    # NVIDIA NGC vLLM image REQUIRES these — default Docker SHM is 64MB which
    # is way too small for vLLM's multi-process IPC; engine cores fail to start.
    # Without these, you get: "Engine core initialization failed, Failed core proc(s): {}"
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    networks: [apex]
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 300s          # large models take minutes to load

  # ── vLLM VL — vision-language model, mutually exclusive with the text vllm ──
  # Owned by model-switch (compose.switch.yml): started when a client asks for
  # VL_MODEL_NAME, stopped when a client asks for the text model.
  #
  # `profiles: [manual]` means `docker compose up -d` will NOT auto-start this;
  # model-switch starts/stops it via the Docker API. To bring it up outside
  # the switcher for debugging: `docker compose --profile manual up -d vllm-vl`.
  #
  # Memory: when active, the text vllm is stopped, so this service can claim
  # a large slice of the 128 GB pool. Default 0.35 (~45 GB) is generous for
  # an 8B VLM; bump for 32B FP8 (see VL_GPU_UTIL in .env.example).
  vllm-vl:
    profiles: ["manual"]
    image: nvcr.io/nvidia/vllm:25.11-py3
    # Same VLLM_MODEL-style resolver as the text vllm service.
    # Note: --limit-mm-per-prompt accepts JSON in vLLM 0.10+; older forms
    # (image=N) were deprecated. See vllm issue #21615.
    command:
      - sh
      - -c
      - >
        M="${VL_MODEL:-Qwen/Qwen3-VL-8B-Instruct}";
        case "$$M" in
          /*)   LOAD="$$M";             SERVED="$${M##*/}" ;;
          */*)  LOAD="$$M";             SERVED="$${M##*/}" ;;
          *)    LOAD="/data/local/$$M"; SERVED="$$M" ;;
        esac;
        echo "vLLM-VL loading: $$LOAD   (API model name: $$SERVED)";
        exec vllm serve "$$LOAD"
        --served-model-name "$$SERVED"
        --gpu-memory-utilization "${VL_GPU_UTIL:-0.35}"
        --max-model-len "${VL_MAX_LEN:-32768}"
        --limit-mm-per-prompt '{"image":${VL_MAX_IMAGES:-6}}'
        --host 0.0.0.0 --port 8000
    environment:
      HF_TOKEN: ${HF_TOKEN}
      HF_HUB_ENABLE_HF_TRANSFER: "1"
      HF_HOME: /data/hf-cache
    volumes:
      - /data/models:/data
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    networks: [apex]
    # NO restart policy — model-switch owns lifecycle. If this restarted
    # automatically it would fight the switcher's stop() calls.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 300s

  # ── Ollama — 25% of inference pool (~28GB; enforced by 1-model-at-a-time) ──
  ollama:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: "0.0.0.0"
      OLLAMA_MAX_LOADED_MODELS: "1"   # hard discipline so Ollama stays in its 28GB
      OLLAMA_NUM_PARALLEL: "2"
      OLLAMA_KEEP_ALIVE: "30m"
    volumes:
      - /data/models/ollama:/root/.ollama
    networks: [apex]
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── TEI — production embeddings for the RAG pipeline ──
  # NOTE: HuggingFace doesn't publish an arm64 prebuilt for TEI on any tag,
  # so this image must be BUILT FROM SOURCE on the spark — see SETUP.md B2-build.
  # Default is the GB10/sm_121 GPU build (~5-15ms/embedding, ~4 GB GPU mem,
  # ~30-60 min to build). The embedder + reranker together cost ~8 GB GPU,
  # accounted for by VLLM_GPU_UTIL=0.58 (down from 0.65 CPU-default).
  # To fall back to CPU/arm64 (~50-150ms/embedding, ~15 min build):
  #   1. set TEI_IMAGE=local/tei:cpu-arm64 in .env
  #   2. remove the `deploy.resources.reservations.devices` blocks below
  #   3. bump VLLM_GPU_UTIL back up ~0.07 to reclaim the freed slice
  tei:
    image: ${TEI_IMAGE:-local/tei:gb10}
    # The TEI image bakes in ENTRYPOINT ["text-embeddings-router"], which would
    # consume our `sh -c` as positional args. Clear the entrypoint so `command`
    # is the full command line, then exec back into the binary ourselves.
    entrypoint: []
    # Same VLLM_MODEL-style resolver as the vllm service: bare names expand to
    # /data/local/<name>, absolute paths and HF repo IDs pass through.
    command:
      - sh
      - -c
      - >
        M="${TEI_MODEL}";
        case "$$M" in
          /*)   LOAD="$$M" ;;
          */*)  LOAD="$$M" ;;
          *)    LOAD="/data/local/$$M" ;;
        esac;
        echo "TEI embedder loading: $$LOAD";
        exec text-embeddings-router --model-id "$$LOAD"
    environment:
      HF_TOKEN: ${HF_TOKEN}
      HF_HOME: /data/hf-cache       # points HF lib at the bind-mounted cache below
    volumes:
      # Same as vllm — see explanation above. TEI_MODEL accepts three forms:
      #   bge-m3                        (bare name — preferred; expands to /data/local/bge-m3)
      #   /data/local/bge-m3            (absolute path; legacy)
      #   BAAI/bge-m3                   (HF repo ID — HF cache layout under /data/hf-cache)
      - /data/models:/data
    networks: [apex]
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── TEI reranker — second TEI instance for the RAG /rerank endpoint ──
  # Same image as the embedder above; TEI auto-detects cross-encoder models
  # from config.json and exposes /rerank (Cohere-compatible) instead of /embed.
  # Runs on GPU alongside the embedder (~4 GB additional GPU mem) for sub-100ms
  # rerank-of-25 latency. To split — embedder GPU, reranker CPU — override
  # this service's `image:` to local/tei:cpu-arm64 and drop the deploy block.
  # NB: any model pointed at by TEI_RERANKER_MODEL must satisfy BOTH:
  #   (a) onnx/model.onnx present on HF (ORT backend requirement), and
  #   (b) `model_type` field set in config.json (TEI's strict parser doesn't
  #       follow auto_map / trust_remote_code patterns).
  # See .env.example for the cautionary list (bge-reranker-v2-m3 fails (a);
  # jina-reranker-v2-base-multilingual fails (b)).
  tei-reranker:
    image: ${TEI_IMAGE:-local/tei:gb10}
    entrypoint: []                              # see tei service comment above
    command:
      - sh
      - -c
      - >
        M="${TEI_RERANKER_MODEL}";
        case "$$M" in
          /*)   LOAD="$$M" ;;
          */*)  LOAD="$$M" ;;
          *)    LOAD="/data/local/$$M" ;;
        esac;
        echo "TEI reranker loading: $$LOAD";
        exec text-embeddings-router --model-id "$$LOAD"
    environment:
      HF_TOKEN: ${HF_TOKEN}
      HF_HOME: /data/hf-cache
    volumes:
      - /data/models:/data
    networks: [apex]
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
