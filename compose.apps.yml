# Web / backend apps. Each must be arm64 / multi-arch.
#
# The 'apex' external network gives apps access to:
#   model-switch:9000 — OpenAI-compatible LLM API (multiplexes vllm text/VL;
#                       always prefer this over vllm:8000 so both models are
#                       visible and mutex-swap works on model change).
#   vllm:8000   — text vLLM backend (do NOT hit directly from apps — bypasses
#                 the switcher; only advertises the text model).
#   tei:80      — embeddings (bge-m3)
#   ollama:11434 — Ollama API
#   postgres:5432, redis:6379, qdrant:6333, minio:9000 — data services
networks:
  apex:
    name: apex
    external: true

services:
  # ── open-webui — browser chat UI talking to vLLM (OpenAI-compatible) ──
  # Reached via Caddy at https://${SITE_HOST}/chat
  # First user to sign up becomes admin (WEBUI_AUTH=true).
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    environment:
      # Point at model-switch so open-webui sees BOTH text + VL models on
      # /v1/models, and hits the mutex-swap path on model change. Talking to
      # vllm:8000 directly would only advertise the text model.
      OPENAI_API_BASE_URL: http://model-switch:9000/v1
      OPENAI_API_KEY: dummy                  # switcher doesn't validate; any value works
      WEBUI_AUTH: "true"                     # first signup → admin
      WEBUI_NAME: "APEX Spark"
      WEBUI_URL: "https://${SITE_HOST}"      # served at site root (open-webui doesn't sub-path cleanly)
      ENABLE_OLLAMA_API: "false"             # we expose Ollama separately at /ollama
      # RAG embeddings — use TEI (already running bge-m3) instead of downloading
      # the default all-MiniLM-L6-v2 from HF. Avoids first-start hang on this
      # proxy-restricted box AND uses the same embedder as our app code.
      RAG_EMBEDDING_ENGINE: "openai"
      RAG_OPENAI_API_BASE_URL: "http://tei:80"
      RAG_OPENAI_API_KEY: "dummy"
      RAG_EMBEDDING_MODEL: "${TEI_MODEL}"
      # Pass HF token so anything that *does* need HF (re-rankers etc.) authenticates
      HF_TOKEN: "${HF_TOKEN}"
    volumes:
      - /data/srv/data/open-webui:/app/backend/data
    networks: [apex]
    restart: unless-stopped

