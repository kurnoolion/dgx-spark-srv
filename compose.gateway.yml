# Caddy reverse proxy — single TLS entrypoint. NO auth (relies on VPN/network).
# See git history for the prior oauth2-proxy + forward_auth version if needed.
networks:
  apex:
    name: apex

services:
  caddy:
    image: caddy:2
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /data/srv/data/caddy:/data          # TLS certs + internal-CA state
      - /data/srv/data/caddy-config:/config
      # Status dashboard content — written by on-box scripts into
      # /data/srv/status/ on the host; served read-only by Caddy under
      # /health-status/ (see Caddyfile).
      - /data/srv/status:/srv/static/status:ro
    environment:
      SITE_HOST: ${SITE_HOST}
      # Caddy uses SITE_ADDRESSES as its site-address line. Defaults to SITE_HOST
      # if not explicitly set. Set to "host, ip" in .env to bind both.
      SITE_ADDRESSES: ${SITE_ADDRESSES:-${SITE_HOST}}
    networks: [apex]
    restart: unless-stopped
