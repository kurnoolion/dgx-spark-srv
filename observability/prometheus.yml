global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # per-container memory (container_memory_working_set_bytes, _rss, spec limit)
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  # host memory (node_memory_*), cpu, disk
  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']

  # GPU memory/util/temp (DCGM_FI_DEV_FB_USED, etc.) — drops out cleanly if dcgm
  # isn't running
  - job_name: dcgm
    static_configs:
      - targets: ['dcgm-exporter:9400']
